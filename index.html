<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:#132252}
#pw-screen{position:fixed;inset:0;background:#132252;z-index:9999;display:flex;align-items:center;justify-content:center}
.pw-box{background:#fff;border-radius:16px;padding:40px 36px;width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.35)}

.pw-sub{font-size:13px;color:#7a8fa8;margin-bottom:24px;line-height:1.5}
.pw-input{width:100%;padding:12px 14px;border:1.5px solid #dce3ed;border-radius:8px;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;color:#132252;text-align:center;letter-spacing:3px}
.pw-input:focus{border-color:#c9973a}
.pw-btn{width:100%;margin-top:14px;padding:12px;border-radius:8px;border:none;background:#132252;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s}
.pw-btn:hover{background:#1a2e60}
.pw-loading{display:none;margin-top:14px;font-size:12px;color:#7a8fa8}
.pw-fout{display:none;margin-top:12px;background:#fde8e8;color:#8b1a1a;padding:9px 14px;border-radius:7px;font-size:12px}
.pw-footer{margin-top:20px;font-size:11px;color:#b0b8c9}

}
